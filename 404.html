<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script>
  (function(){
    try {
      var saved = localStorage.getItem('pc.theme');
      var theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    } catch(e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
</script>
<title>Page not found · PurchasingCorp</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />

<link rel="stylesheet" href="/tailwind.css" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-ink-950 text-ink-100 font-sans antialiased selection:bg-white selection:text-black">

<div aria-hidden="true" class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,rgba(255,255,255,0.05),transparent_60%)]"></div>
</div>

<main class="min-h-screen flex items-center justify-center px-5">
  <div class="text-center max-w-md">
    <a href="/" class="inline-flex items-center gap-2.5">
      <span class="grid h-8 w-8 place-items-center rounded-full bg-white text-black font-bold">
        <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M4 7h12a4 4 0 0 1 0 8H7l-3 3"/></svg>
      </span>
      <span class="text-[15px] font-semibold tracking-tight">PURCHASING<span class="text-ink-300 font-normal">CORP</span></span>

    <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
      <a href="/" class="inline-flex items-center gap-2 rounded-full bg-white px-5 py-3 text-sm font-medium text-black hover:bg-ink-100 transition">Back to home</a>
