<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Test</title>
</head>
<body>
    <h1>Testing Vercel Analytics</h1>
    <p>Check browser console for analytics initialization</p>
    <script type="module" src="/analytics.js"></script>
    <script type="module">
        // Verify analytics is loaded
        setTimeout(() => {
            console.log('Window.va:', window.va);
            console.log('Window.vaq:', window.vaq);
            console.log('Window.vam:', window.vam);
            if (window.va) {
                console.log('✅ Vercel Analytics initialized successfully!');
            } else {
                console.log('❌ Vercel Analytics not initialized');
            }
        }, 1000);
    </script>
</body>
</html>
