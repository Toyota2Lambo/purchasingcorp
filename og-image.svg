<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1a1a1d" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="topLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#050505"/>
  <rect width="1200" height="630" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="1200" height="1" fill="url(#topLine)"/>

  <!-- ambient soft circle -->
  <circle cx="600" cy="-50" r="450" fill="rgba(255,255,255,0.04)"/>

  <!-- nav row -->
  <g transform="translate(80,75)">
    <!-- logo dot -->
    <rect x="0" y="0" width="42" height="42" rx="21" fill="#ffffff"/>
    <path d="M11 16h18a7 7 0 0 1 0 14H16l-6 6" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="56" y="29" font-family="Inter,system-ui,sans-serif" font-size="20" font-weight="600" fill="#ffffff" letter-spacing="-0.2">PURCHASING<tspan fill="#8a8a92" font-weight="400">CORP</tspan></text>
  </g>

  <!-- status pill top right -->
  <g transform="translate(910,80)">
    <rect x="0" y="0" width="210" height="32" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
    <circle cx="16" cy="16" r="4" fill="#34d399"/>
    <text x="28" y="21" font-family="Inter,system-ui,sans-serif" font-size="12.5" fill="#b6b6bc">Quoting now — &lt;30 min reply</text>
  </g>

  <!-- main heading -->
  <text x="80" y="290" font-family="Inter,system-ui,sans-serif" font-size="86" font-weight="600" fill="#ffffff" letter-spacing="-3">Turn idle devices</text>
  <text x="80" y="385" font-family="Inter,system-ui,sans-serif" font-size="86" font-weight="600" fill="#ffffff" letter-spacing="-3">into <tspan font-family="Instrument Serif,Georgia,serif" font-style="italic" font-weight="400" fill="#8a8a92">instant cash.</tspan></text>

  <!-- subtitle -->
  <text x="80" y="445" font-family="Inter,system-ui,sans-serif" font-size="22" fill="#8a8a92" letter-spacing="-0.2">More than Apple. More than Best Buy. Cash today, no haggling.</text>

  <!-- benefit pills -->
  <g transform="translate(80,500)">
    <g>
      <rect x="0" y="0" width="220" height="56" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
      <text x="20" y="35" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" fill="#ffffff">💰 Top dollar paid</text>
    </g>
    <g transform="translate(240,0)">
      <rect x="0" y="0" width="220" height="56" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
      <text x="20" y="35" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" fill="#ffffff">⚡ Same-day payout</text>
    </g>
    <g transform="translate(480,0)">
      <rect x="0" y="0" width="240" height="56" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)"/>
      <text x="20" y="35" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" fill="#ffffff">🤝 Zero haggling</text>
    </g>
  </g>

  <!-- decorative price chips on the right -->
  <g transform="translate(820,200)" opacity="0.95">
    <g>
      <rect x="0" y="0" width="300" height="68" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
      <text x="22" y="30" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#8a8a92">iPhone 17 Pro Max 1TB</text>
      <text x="22" y="52" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="600" fill="#ffffff">$1,050</text>
      <text x="248" y="52" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#34d399">+$300</text>
    </g>
    <g transform="translate(0,84)">
      <rect x="0" y="0" width="300" height="68" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
      <text x="22" y="30" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#8a8a92">MacBook Pro M4 Max</text>
      <text x="22" y="52" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="600" fill="#ffffff">$1,425</text>
      <text x="248" y="52" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#34d399">+$595</text>
    </g>
    <g transform="translate(0,168)">
      <rect x="0" y="0" width="300" height="68" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)"/>
      <text x="22" y="30" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#8a8a92">PlayStation 5 Pro</text>
      <text x="22" y="52" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="600" fill="#ffffff">$425</text>
      <text x="248" y="52" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600" fill="#34d399">paid today</text>
    </g>
  </g>
</svg>
