<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PurchasingCorp — Index Card</title>
<link rel="stylesheet" href="_shared.css">
<style>
  /* INDEX CARD — data-dense reference grid.
     Mono eyebrow -> Inter title -> a 3x2 (feed) or 2x3 (story) grid
     of cells. Each cell is the same atomic unit: a small mono label,
     a big number, a small mono footnote. Used for "what we buy",
     category price ranges, or business-credibility receipts. */

  .stage { padding: 96px; justify-content: flex-start; }
  .brand { margin-bottom: 0; }

  .header-row { display: flex; justify-content: space-between; align-items: center; }

  .idx-eyebrow {
    font-family: var(--display);
    font-weight: 600;
    font-size: 17px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 64px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .idx-eyebrow::before { content: ""; width: 52px; height: 1px; background: var(--accent); }

  .idx-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 92px;
    line-height: .98;
    letter-spacing: -.035em;
    color: var(--text);
    margin: 28px 0 52px;
    max-width: 18ch;
  }
  .idx-title em { font-family: var(--display); font-style: normal; font-weight: 800; color: var(--accent); }
  body[data-size="story"] .idx-title { font-size: 108px; }

  .idx-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    border-top: 1px solid var(--border);
    border-left: 1px solid var(--border);
    margin-bottom: 44px;
  }
  body[data-size="story"] .idx-grid {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
  }

  .idx-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 36px 30px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 220px;
  }
  body[data-size="story"] .idx-cell { min-height: 280px; }

  .cell-label {
    font-family: var(--display);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .cell-num {
    font-family: var(--display);
    font-weight: 700;
    font-size: 80px;
    line-height: .98;
    letter-spacing: -.04em;
    color: var(--text);
    margin: 16px 0 12px;
  }
  body[data-size="story"] .cell-num { font-size: 96px; }
  .cell-num.accent { color: var(--accent); }
  .cell-num.neg    { color: var(--neg); }

  .cell-foot {
    font-family: var(--display);
    font-weight: 500;
    font-size: 13px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .idx-note {
    font-family: var(--display);
    font-weight: 400;
    font-size: 28px;
    line-height: 1.4;
    color: var(--text-muted);
    max-width: 38ch;
    margin-bottom: 36px;
  }
  .idx-note em { color: var(--accent); font-style: normal; font-weight: 600; }
</style>
</head>
<body data-size="{{size}}">
  <div class="stage">

    <div class="header-row">
      <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#050505" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h12a4 4 0 0 1 0 8H7l-3 3"/></svg>
        </span>
        <span class="brand-name">PURCHASING<span class="muted">CORP</span></span>
      </div>
      <div class="tag">{{tag}}</div>
    </div>

    <div class="idx-eyebrow">{{eyebrow}}</div>
    <div class="idx-title">{{title_html}}</div>

    <div class="idx-grid">
      {{index_cells_html}}
    </div>

    <div class="idx-note">{{note_html}}</div>

    <div class="footer">
      purchasingcorp.com <span class="dot">·</span>
      <span class="promo">get your offer</span>
    </div>

  </div>
</body>
</html>
