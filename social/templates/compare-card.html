<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PurchasingCorp — Compare Card</title>
<link rel="stylesheet" href="_shared.css">
<style>
  /* COMPARE CARD — "we pay more" in one glance.
     A horizontal bar chart: our offer is the long emerald bar at top,
     the trade-in alternatives sit below in muted red. Same device,
     side by side. Competitor figures are framed as typical estimates
     in the note (we never fabricate a precise rival quote). */

  .stage { padding: 96px; justify-content: flex-start; }
  .brand { margin-bottom: 0; }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cmp-eyebrow {
    font-family: var(--mono);
    font-size: 17px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 68px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .cmp-eyebrow::before { content: ""; width: 52px; height: 1px; background: var(--accent); }

  .cmp-title {
    font-family: var(--display);
    font-weight: 700;
    font-size: 94px;
    line-height: .98;
    letter-spacing: -.035em;
    color: var(--text);
    margin: 28px 0 56px;
    max-width: 15ch;
  }
  .cmp-title em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--accent); }
  body[data-size="story"] .cmp-title { font-size: 110px; }

  /* Bars are the hero proof — generous gaps + chunky tracks let the
     three-bar comparison fill the taller 4:5 canvas instead of clustering
     under the title with a void below. */
  .bars { display: flex; flex-direction: column; gap: 60px; margin-bottom: 56px; }
  .bar-row { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .bar-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--mono);
    font-size: 21px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .bar-row.us .bar-meta { color: var(--text); }
  .bar-value { font-family: var(--display); font-weight: 700; letter-spacing: -.02em; font-size: 36px; }
  .bar-row.us  .bar-value { color: var(--accent); }
  .bar-row.alt .bar-value { color: var(--neg); }

  .bar-track {
    height: 46px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .bar-fill { height: 100%; width: var(--w, 0%); border-radius: 7px 0 0 7px; }
  .bar-row.us  .bar-fill { background: var(--accent); }
  .bar-row.alt .bar-fill { background: var(--neg); opacity: .55; }
  body[data-size="story"] .bar-track { height: 54px; }

  .cmp-note {
    font-family: var(--serif);
    font-style: italic;
    font-size: 28px;
    line-height: 1.3;
    color: var(--text-muted);
    margin-top: auto;
    margin-bottom: 36px;
    max-width: 34ch;
  }
  .cmp-note em { color: var(--accent); font-style: italic; }
</style>
</head>
<body data-size="{{size}}">
  <div class="stage">

    <div class="header-row">
      <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#050505" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h12a4 4 0 0 1 0 8H7l-3 3"/></svg>
        </span>
        <span class="brand-name">PURCHASING<span class="muted">CORP</span></span>
      </div>
      <div class="tag">{{tag}}</div>
    </div>

    <div class="cmp-eyebrow">{{eyebrow}}</div>
    <div class="cmp-title">{{title_html}}</div>

    <div class="bars">
      {{bars_html}}
    </div>

    <div class="cmp-note">{{note_html}}</div>

    <div class="footer">
      purchasingcorp.com <span class="dot">·</span>
      <span class="promo">we pay more</span>
    </div>

  </div>
</body>
</html>
