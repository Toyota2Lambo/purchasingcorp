<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PurchasingCorp — Stat Card</title>
<link rel="stylesheet" href="_shared.css">
<style>
  /* STAT CARD — one number, weaponized.
     One enormous Inter number takes most of the canvas; a mono
     eyebrow sets context; an Instrument-Serif italic caption tells
     you why it matters; a mono source line receipts it. The number
     IS the post (a top payout, a turnaround time, a category count). */

  .stage { padding: 96px; justify-content: flex-start; }
  .brand { margin-bottom: 0; }

  .stat-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    margin: auto 0;            /* center the block — no dead zone below */
    width: 100%;
  }

  .stat-eyebrow {
    font-family: var(--mono);
    font-size: 17px;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
  }
  .stat-eyebrow::before { content: ""; width: 52px; height: 1px; background: var(--accent); }

  /* The value auto-fits the canvas: it never exceeds the cap (440/560px),
     but long strings ("$1,241") shrink to fit the ~888px content width
     instead of overflowing. --len (char count) is set by the renderer;
     ~0.62 approximates Inter-800's per-character advance. */
  .stat-number {
    --len: 2;
    font-family: var(--display);
    font-weight: 800;
    font-size: min(440px, calc(888px / (var(--len) * 0.62)));
    line-height: .84;
    letter-spacing: -.06em;
    color: var(--accent);
    margin: 0;
    max-width: 100%;
    display: flex;
    align-items: flex-start;
  }
  .stat-number .unit {
    color: var(--text);
    font-size: .3em;
    margin-left: 14px;
    margin-top: .14em;
    letter-spacing: -.02em;
    font-weight: 700;
  }
  body[data-size="story"] .stat-number { font-size: min(560px, calc(888px / (var(--len) * 0.62))); }

  .stat-caption {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 58px;
    line-height: 1.12;
    letter-spacing: -.01em;
    color: var(--text);
    max-width: 18ch;
    margin-top: 52px;
  }
  .stat-caption em { color: var(--accent); font-style: italic; }
  body[data-size="story"] .stat-caption { font-size: 70px; }

  .stat-source {
    font-family: var(--mono);
    font-size: 16px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .stat-source::before { content: ""; width: 24px; height: 1px; background: var(--text-dim); }

  /* Stories are tall (1920) — open up the rhythm so the block fills the
     frame instead of floating in the upper third with a void below. */
  body[data-size="story"] .stat-eyebrow { margin-bottom: 56px; }
  body[data-size="story"] .stat-caption { margin-top: 80px; }
  body[data-size="story"] .stat-source  { margin-top: 48px; }
</style>
</head>
<body data-size="{{size}}">
  <div class="stage">

    <div class="brand">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#050505" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h12a4 4 0 0 1 0 8H7l-3 3"/></svg>
      </span>
      <span class="brand-name">PURCHASING<span class="muted">CORP</span></span>
    </div>

    <div class="stat-wrap">
      <div class="stat-eyebrow">{{eyebrow}}</div>
      <div class="stat-number" style="--len: {{stat_len}}">{{stat_value}}<span class="unit">{{stat_unit}}</span></div>
      <div class="stat-caption">{{caption_html}}</div>
      <div class="stat-source">{{source}}</div>
    </div>

    <div class="footer">
      purchasingcorp.com <span class="dot">·</span>
      <span class="promo">same-day payout</span>
    </div>

  </div>
</body>
</html>
