<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PurchasingCorp — Lifestyle Card</title>
<link rel="stylesheet" href="_shared.css">
<style>
  /* LIFESTYLE CARD — the aspirational, outcome-forward post.
     A framed editorial photo (a drawer of forgotten devices, a hand of
     cash, a clean desk) sits up top; the message lands below on solid
     ink. Where photo-cover-card is full-bleed atmosphere, this is a
     "before/after" feature: the picture is the old gear, the headline
     is the cash it becomes. Sells the feeling — that dead drawer phone
     is money — not a spec. Photo credit (Unsplash) sinks into the frame. */

  .stage { padding: 96px; justify-content: flex-start; }
  .brand { margin-bottom: 0; }

  .header-row { display: flex; justify-content: space-between; align-items: center; }

  .life-photo {
    position: relative;
    margin-top: 52px;
    width: 100%;
    height: 440px;
    border: 1px solid var(--border-strong);
    border-radius: 18px;
    overflow: hidden;
    flex-shrink: 0;
  }
  body[data-size="story"] .life-photo { height: 760px; margin-top: 68px; }
  .life-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%) brightness(0.72) contrast(1.06);
  }
  .life-photo img[src=""], .life-photo img:not([src]) { display: none; }
  /* gradient so the credit + bottom edge sink into the frame */
  .life-photo::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 48%, rgba(5,5,5,0.55) 100%);
  }
  .life-credit {
    position: absolute;
    bottom: 14px;
    right: 18px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--text-soft);
    opacity: .75;
    z-index: 1;
  }

  .life-body { margin-top: 54px; }

  .life-eyebrow {
    font-family: var(--mono);
    font-size: 17px;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 30px;
  }
  .life-eyebrow::before { content: ""; width: 48px; height: 1px; background: var(--accent); }

  .life-headline {
    font-family: var(--display);
    font-weight: 700;
    font-size: 104px;
    line-height: .96;
    letter-spacing: -.04em;
    color: var(--text);
    max-width: 15ch;
  }
  .life-headline em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--accent); }
  body[data-size="story"] .life-headline { font-size: 132px; }

  .life-sub {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 34px;
    line-height: 1.3;
    color: var(--text-muted);
    max-width: 28ch;
    margin-top: 30px;
  }
  .life-sub em { color: var(--accent); font-style: italic; }
  body[data-size="story"] .life-sub { font-size: 40px; }
</style>
</head>
<body data-size="{{size}}">
  <div class="stage">

    <div class="header-row">
      <div class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#050505" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h12a4 4 0 0 1 0 8H7l-3 3"/></svg>
        </span>
        <span class="brand-name">PURCHASING<span class="muted">CORP</span></span>
      </div>
      <div class="tag">{{tag}}</div>
    </div>

    <div class="life-photo">
      <img src="{{photo_url}}" alt="">
      <div class="life-credit">{{photo_credit}}</div>
    </div>

    <div class="life-body">
      <div class="life-eyebrow">{{eyebrow}}</div>
      <div class="life-headline">{{headline_html}}</div>
      <div class="life-sub">{{sub_html}}</div>
    </div>

    <div class="footer">
      purchasingcorp.com <span class="dot">·</span>
      <span class="promo">cash today</span>
    </div>

  </div>
</body>
</html>
