<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PurchasingCorp — Photo Cover Card</title>
<link rel="stylesheet" href="_shared.css">
<style>
  /* PHOTO COVER CARD — atmospheric magazine spread.
     A full-bleed photo (a clean device flat-lay, a desk, a tech
     close-up) gets desaturated, contrast-bumped, dimmed, and a deep
     vertical gradient drops the bottom into near-black so the headline
     reads. Reserved for moments that benefit from atmosphere. Photo
     credit sits bottom-right (tiny mono) for Unsplash attribution. */

  .stage { padding: 0; }

  .photo-layer { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
  .photo-layer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%) contrast(1.05) brightness(0.74);
  }
  .photo-layer::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(5,5,5,0.35) 0%,
      rgba(5,5,5,0.45) 40%,
      rgba(5,5,5,0.86) 75%,
      rgba(5,5,5,0.98) 100%
    );
  }

  .photo-stage {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: 96px;
  }

  .photo-top { display: flex; justify-content: space-between; align-items: center; }

  .photo-body { margin-top: auto; margin-bottom: auto; padding-top: 80px; }

  .photo-eyebrow {
    font-family: var(--display);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 28px;
  }
  .photo-eyebrow::before { content: ""; width: 48px; height: 1px; background: var(--accent); }

  .photo-headline {
    font-family: var(--display);
    font-weight: 700;
    font-size: 132px;
    line-height: .92;
    letter-spacing: -.04em;
    color: var(--text);
    max-width: 860px;
    margin-bottom: 36px;
  }
  .photo-headline em { font-family: var(--display); font-style: normal; font-weight: 800; color: var(--accent); }
  body[data-size="story"] .photo-headline { font-size: 164px; }

  .photo-deck {
    font-family: var(--display);
    font-style: normal;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.4;
    color: var(--text-soft);
    max-width: 680px;
    padding-top: 24px;
    border-top: 1px solid rgba(52, 211, 153, 0.45);
  }
  .photo-deck em { color: var(--accent); font-style: normal; font-weight: 600; }
  body[data-size="story"] .photo-deck { font-size: 36px; max-width: 720px; }

  .photo-stage .footer { border-top: 0; padding-top: 0; }

  .photo-credit {
    position: absolute;
    bottom: 22px;
    right: 28px;
    font-family: var(--display);
    font-weight: 500;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-dim);
    opacity: .7;
    z-index: 2;
  }
</style>
</head>
<body data-size="{{size}}">
  <div class="stage">

    <div class="photo-layer">
      <img src="{{photo_url}}" alt="">
    </div>

    <div class="photo-stage">

      <div class="photo-top">
        <div class="brand">
          <span class="brand-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="#050505" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h12a4 4 0 0 1 0 8H7l-3 3"/></svg>
          </span>
          <span class="brand-name">PURCHASING<span class="muted">CORP</span></span>
        </div>
        <div class="tag">{{tag}}</div>
      </div>

      <div class="photo-body">
        <div class="photo-eyebrow">{{eyebrow}}</div>
        <div class="photo-headline">{{headline_html}}</div>
        <div class="photo-deck">{{deck_html}}</div>
      </div>

      <div class="footer">
        purchasingcorp.com <span class="dot">·</span>
        <span class="promo">same-day payout</span>
      </div>

    </div>

    <div class="photo-credit">{{photo_credit}}</div>

  </div>
</body>
</html>
