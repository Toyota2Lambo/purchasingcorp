name: social · threads

# Publishes an already-rendered, already-deployed day to Meta Threads.
# Reuses the SAME content/manifest and the SAME public Vercel-served PNGs
# as "social · publish" (Instagram) — nothing extra is generated here.
#
# CHAINED off "social · daily" (same trigger as the Instagram publish), so IG
# and Threads both fire the moment generation succeeds. They hit different
# APIs and accounts, so running in parallel is fine — and Threads no longer
# rides a separate fragile clock that, in practice, never fired.
#
# Threads has no "stories" format, so feed posts are published by default
# and stories are skipped. Set the `include_stories` input (or
# THREADS_INCLUDE_STORIES=1) to also post story images as plain image posts.
#
# Use the `only` input on a manual run to stagger, e.g. "post:1".

on:
  workflow_run:
    workflows: ["social · daily"]
    types: [completed]
  workflow_dispatch:
    inputs:
      date:
        description: 'Date YYYY-MM-DD (default: today, UTC)'
        required: false
      only:
        description: "Filter, e.g. post:1 | posts (blank = all posts)"
        required: false
      include_stories:
        description: 'Also post story images as plain image posts'
        required: false
        default: 'false'
      dry_run:
        description: 'Plan only, no real API calls'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: social-threads
  cancel-in-progress: false

jobs:
  threads:
    # workflow_run fires for EVERY conclusion of the daily build — only publish
    # when it actually succeeded (or when this was triggered manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Take main's tip: "social · daily" pushes today's content as a NEW
          # commit, which is not the SHA that triggered this workflow_run.
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Threads
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          IG_PUBLIC_BASE_URL: ${{ vars.IG_PUBLIC_BASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          THREADS_DRY_RUN: ${{ github.event.inputs.dry_run }}
          THREADS_INCLUDE_STORIES: ${{ github.event.inputs.include_stories }}
        run: |
          ARGS="--date ${{ steps.date.outputs.date }}"
          if [ -n "${{ github.event.inputs.only }}" ]; then
            ARGS="$ARGS --only ${{ github.event.inputs.only }}"
          fi
          python social/threads_publisher.py $ARGS
