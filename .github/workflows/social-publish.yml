name: social · publish

# Publishes an already-rendered, already-deployed day to Instagram.
# Run AFTER "social · daily" has committed and Vercel has deployed — the
# publisher polls each PNG URL until it returns 200 (up to ~3 min) before
# submitting, so a little overlap with the deploy is harmless.
#
# Use the `only` input to stagger a day across multiple runs, e.g.
# "post:1" in the morning and "post:2,story:1" at noon.

on:
  schedule:
    # 16:00 UTC — ~3h after the daily generate/commit.
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date YYYY-MM-DD (default: today, UTC)'
        required: false
      only:
        description: "Filter, e.g. post:1 | story:2 | posts | stories (blank = all)"
        required: false
      dry_run:
        description: 'Plan only, no real API calls'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: social-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_PUBLIC_BASE_URL: ${{ vars.IG_PUBLIC_BASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          IG_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS="--date ${{ steps.date.outputs.date }}"
          if [ -n "${{ github.event.inputs.only }}" ]; then
            ARGS="$ARGS --only ${{ github.event.inputs.only }}"
          fi
          python social/ig_publisher.py $ARGS
