name: social · publish

# Publishes an already-rendered, already-deployed day to Instagram —
# STAGGERED across the day. Each scheduled slot publishes ONE feed post
# (mapped from its cron string below), so the day's posts trickle out instead
# of landing in a single burst. The publisher polls each PNG URL until it
# returns 200 (i.e. the Vercel deploy has landed) before submitting, so a slot
# that fires while the deploy is still propagating simply waits.
#
# Generation ("social · daily") writes the day's manifest at 13:23 UTC; the
# first slot below is comfortably after that. A manual run still publishes
# EVERYTHING by default (blank `only`), or a single item via the `only` input.
#
# Times are UTC. ET/PT shown for reference (ET = UTC-4 in summer / -5 winter).
#
# NOTE: this slot map assumes 10 feed posts + 2 stories per day. If you change
# --posts in social-daily.yml, update the slots here AND in social-threads.yml.

on:
  schedule:
    - cron: '45 14 * * *'   # post 1 (+ story 1)   10:45 AM ET / 7:45 AM PT
    - cron: '5 16 * * *'    # post 2               12:05 PM ET / 9:05 AM PT
    - cron: '25 17 * * *'   # post 3                1:25 PM ET / 10:25 AM PT
    - cron: '45 18 * * *'   # post 4                2:45 PM ET / 11:45 AM PT
    - cron: '5 20 * * *'    # post 5 (+ story 2)    4:05 PM ET / 1:05 PM PT
    - cron: '25 21 * * *'   # post 6                5:25 PM ET / 2:25 PM PT
    - cron: '45 22 * * *'   # post 7                6:45 PM ET / 3:45 PM PT
    - cron: '5 0 * * *'     # post 8                8:05 PM ET / 5:05 PM PT
    - cron: '25 1 * * *'    # post 9                9:25 PM ET / 6:25 PM PT
    - cron: '45 2 * * *'    # post 10              10:45 PM ET / 7:45 PM PT
  workflow_dispatch:
    inputs:
      date:
        description: 'Date YYYY-MM-DD (default: today, UTC)'
        required: false
      only:
        description: "Filter, e.g. post:1 | story:2 | posts | stories (blank = all)"
        required: false
      dry_run:
        description: 'Plan only, no real API calls'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: social-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # main's tip holds today's content (committed by "social · daily").
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve which item(s) to publish
        id: filter
        run: |
          # Scheduled run: map the cron string to ONE post (some slots also
          # carry a story). Manual run: honor the `only` input (blank = all).
          case "${{ github.event.schedule }}" in
            "45 14 * * *") ONLY="post:1,story:1" ;;
            "5 16 * * *")  ONLY="post:2" ;;
            "25 17 * * *") ONLY="post:3" ;;
            "45 18 * * *") ONLY="post:4" ;;
            "5 20 * * *")  ONLY="post:5,story:2" ;;
            "25 21 * * *") ONLY="post:6" ;;
            "45 22 * * *") ONLY="post:7" ;;
            "5 0 * * *")   ONLY="post:8" ;;
            "25 1 * * *")  ONLY="post:9" ;;
            "45 2 * * *")  ONLY="post:10" ;;
            *)             ONLY="${{ github.event.inputs.only }}" ;;
          esac
          echo "only=$ONLY" >> "$GITHUB_OUTPUT"

      - name: Publish to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_PUBLIC_BASE_URL: ${{ vars.IG_PUBLIC_BASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          IG_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS="--date ${{ steps.date.outputs.date }}"
          ONLY="${{ steps.filter.outputs.only }}"
          if [ -n "$ONLY" ]; then
            ARGS="$ARGS --only $ONLY"
          fi
          python social/ig_publisher.py $ARGS
