name: social · publish

# Publishes an already-rendered, already-deployed day to Instagram.
# CHAINED off "social · daily": this runs automatically the moment that
# workflow finishes successfully, so it can NEVER run before the content
# exists (the old fixed 16:00 UTC cron sometimes fired first and failed for
# a missing manifest, and often never fired at all). The publisher polls each
# PNG URL until it returns 200 (the Vercel deploy has landed) before
# submitting, so a little overlap with the deploy is harmless.
#
# Publishes ALL of the day's feed posts (singles + carousels) AND stories by
# default. Use the `only` input on a manual run to stagger, e.g. "post:1".

on:
  workflow_run:
    workflows: ["social · daily"]
    types: [completed]
  workflow_dispatch:
    inputs:
      date:
        description: 'Date YYYY-MM-DD (default: today, UTC)'
        required: false
      only:
        description: "Filter, e.g. post:1 | story:2 | posts | stories (blank = all)"
        required: false
      dry_run:
        description: 'Plan only, no real API calls'
        required: false
        default: 'false'

permissions:
  contents: read

concurrency:
  group: social-publish
  cancel-in-progress: false

jobs:
  publish:
    # workflow_run fires for EVERY conclusion of the daily build — only publish
    # when it actually succeeded (or when this was triggered manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Take main's tip: "social · daily" pushes today's content as a NEW
          # commit, which is not the SHA that triggered this workflow_run.
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "date=${{ github.event.inputs.date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
          IG_PUBLIC_BASE_URL: ${{ vars.IG_PUBLIC_BASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          IG_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ARGS="--date ${{ steps.date.outputs.date }}"
          if [ -n "${{ github.event.inputs.only }}" ]; then
            ARGS="$ARGS --only ${{ github.event.inputs.only }}"
          fi
          python social/ig_publisher.py $ARGS
