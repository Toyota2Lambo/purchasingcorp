name: Apply DB Migrations

on:
  push:
    branches: [main]
    paths:
      - 'sql/**'
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply accounts.sql
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql \
            --host="${{ secrets.SUPABASE_DB_HOST }}" \
            --port=5432 \
            --dbname=postgres \
            --username=postgres \
            --file=sql/accounts.sql

      - name: Apply admin.sql
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql \
            --host="${{ secrets.SUPABASE_DB_HOST }}" \
            --port=5432 \
            --dbname=postgres \
            --username=postgres \
            --file=sql/admin.sql
