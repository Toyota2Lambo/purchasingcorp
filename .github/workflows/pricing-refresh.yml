name: pricing · refresh

# Pulls fresh market comps, regenerates the engine outputs, and — when the
# circuit-breaker passes — COMMITS the refreshed offers so Vercel redeploys
# with current pricing:
#
#   api/_pricing/offers.generated.js   condition-aware first offers used by
#                                      /api/inquiry (customer + owner ping)
#   pricing-data.js                    the site's static fallback, re-synced
#                                      from the live sheet-backed /api/pricing
#
# GUARDED BY DESIGN: pricing-engine/check-deltas.js blocks the commit when
# any offer moves more than 30% or the priced-offer count shrinks more than
# 20% vs what's currently deployed — a bad scrape can't go live. A tripped
# run still uploads its artifact for review. The public "Up to $X" price
# table remains sheet-driven; promoting engine prices to the public table is
# still a deliberate manual step (see pricing-engine/README.md).

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      only:
        description: 'Limit to categories, e.g. iphone,consoles (blank = all; partial builds are never committed)'
        required: false
      dry_run:
        description: 'Run the pipeline but write nothing'
        required: false
        default: 'false'
      force_publish:
        description: 'Commit even if the circuit-breaker trips (after reviewing!)'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: pricing-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: pricing-engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Unit tests (margin math + guard rails)
        run: node --test

      - name: Keep a copy of the currently deployed offers
        run: cp ../api/_pricing/offers.generated.js /tmp/offers.deployed.js || echo "no previous offers (first run)"

      - name: Build prices
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_ENV: ${{ vars.EBAY_ENV || 'production' }}
          EBAY_MARKETPLACE_ID: ${{ vars.EBAY_MARKETPLACE_ID || 'EBAY_US' }}
          EBAY_MARKETPLACE_INSIGHTS: ${{ vars.EBAY_MARKETPLACE_INSIGHTS || '0' }}
          BESTBUY_API_KEY: ${{ secrets.BESTBUY_API_KEY }}
          BESTBUY_ENABLED: ${{ vars.BESTBUY_ENABLED || '0' }}
          COMPETITORS_ENABLED: ${{ vars.COMPETITORS_ENABLED || '0' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            node build-prices.js --dry-run ${{ github.event.inputs.only && format('--only {0}', github.event.inputs.only) || '' }}
          else
            node build-prices.js ${{ github.event.inputs.only && format('--only {0}', github.event.inputs.only) || '' }}
          fi

      - name: Re-sync static fallback from live sheet
        if: ${{ github.event.inputs.dry_run != 'true' && !github.event.inputs.only }}
        run: node refresh-snapshot.js

      - name: Circuit-breaker (block publish on suspicious deltas)
        id: breaker
        if: ${{ github.event.inputs.dry_run != 'true' && !github.event.inputs.only }}
        env:
          PRICE_MAX_PCT_DELTA: ${{ vars.PRICE_MAX_PCT_DELTA || 30 }}
          PRICE_MAX_SHRINK_PCT: ${{ vars.PRICE_MAX_SHRINK_PCT || 20 }}
        run: |
          if [ ! -f /tmp/offers.deployed.js ]; then
            echo "first publish — nothing to compare"
          elif node check-deltas.js /tmp/offers.deployed.js ../api/_pricing/offers.generated.js; then
            echo "breaker passed"
          elif [ "${{ github.event.inputs.force_publish }}" = "true" ]; then
            echo "::warning::circuit-breaker TRIPPED but force_publish=true — publishing anyway"
          else
            echo "tripped=true" >> "$GITHUB_OUTPUT"
            echo "::error::circuit-breaker tripped — offers NOT published; inspect the artifact"
          fi

      - name: Commit refreshed pricing (deploys via Vercel)
        if: ${{ github.event.inputs.dry_run != 'true' && !github.event.inputs.only && steps.breaker.outputs.tripped != 'true' }}
        working-directory: .
        run: |
          git config user.name 'pricing-bot'
          git config user.email 'pricing-bot@users.noreply.github.com'
          git add api/_pricing/offers.generated.js pricing-data.js
          if git diff --cached --quiet; then
            echo "no pricing changes this run"
          else
            git commit -m "pricing: refresh offers $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

      - name: Upload run artifact (always, for review/rollback)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pricing-${{ github.run_id }}
          path: |
            pricing-engine/out/pricing-data.generated.js
            pricing-engine/out/pricing.json
            pricing-engine/out/offers.json
            pricing-engine/data/latest.json
          if-no-files-found: warn
          retention-days: 14
